<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revisão do Pedro: 2ª Guerra Mundial</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Segoe UI",system-ui,Arial,sans-serif;
    background:linear-gradient(160deg,#eef3f9,#dfe8f4);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:20px; color:#1E2B38;
  }
  .box{width:100%; max-width:520px; text-align:center;}
  h1{font-size:1.3rem; color:#1d4e89; margin-bottom:4px;}
  .sub{color:#64748b; font-size:.9rem; margin-bottom:18px;}
  .contador{font-weight:700; color:#64748b; margin-bottom:12px;}

  .cartao{
    background:#fff; border-radius:22px; box-shadow:0 12px 34px rgba(30,43,56,.15);
    padding:36px 28px; min-height:250px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
  }
  .rotulo{font-size:.75rem; letter-spacing:1.5px; text-transform:uppercase; font-weight:800;}
  .rotulo.p{color:#E25E42;} .rotulo.r{color:#2e7d4f;}
  .pergunta{font-size:1.4rem; font-weight:800; line-height:1.4;}
  .resposta{font-size:1.2rem; line-height:1.5; color:#13325a; display:none;}
  .resposta.mostrar{display:block; animation:sobe .2s ease;}
  @keyframes sobe{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .bts{display:flex; gap:10px; margin-top:18px; justify-content:center; flex-wrap:wrap;}
  button{
    font-family:inherit; font-size:1rem; font-weight:800; border:none; cursor:pointer;
    padding:14px 22px; border-radius:14px; transition:filter .15s;
  }
  button:hover{filter:brightness(1.08);}
  .ver{background:#1d4e89; color:#fff;}
  .prox{background:#E25E42; color:#fff;}
  .voltar{background:#e2e8f0; color:#1E2B38;}
  .fim{font-size:1.15rem; color:#2e7d4f; font-weight:800; margin-top:6px;}
</style>
</head>
<body>
<a href="index.html" class="btn-voltar-hub" style="position:fixed;top:14px;left:14px;z-index:9999;display:inline-flex;align-items:center;gap:6px;background:#1E2B38;color:#fff;text-decoration:none;font-weight:700;font-size:.88rem;padding:9px 15px;border-radius:30px;box-shadow:0 3px 12px rgba(0,0,0,.22);font-family:'Segoe UI',system-ui,Arial,sans-serif;">🏠 Início</a>
<div class="box">
  <h1>🌍 A 2ª Guerra Mundial em cartões</h1>
  <div class="sub">Leia a pergunta, pense na resposta e depois confira. Pontos principais!</div>
  <div class="contador" id="contador"></div>

  <div class="cartao">
    <div>
      <div class="rotulo p">Pergunta</div>
      <div class="pergunta" id="pergunta"></div>
    </div>
    <div class="resposta" id="resposta"></div>
  </div>

  <div class="bts">
    <button class="voltar" id="voltar">← Voltar</button>
    <button class="ver" id="ver">👁️ Ver resposta</button>
    <button class="prox" id="prox">Próximo →</button>
  </div>
</div>

<script>
const cartoes = [
  ["Em que anos aconteceu a 2ª Guerra Mundial?", "De 1939 a 1945."],
  ["Quem eram Hitler e Mussolini?", "Hitler liderava a Alemanha nazista; Mussolini, a Itália fascista."],
  ["O que fez a guerra começar?", "A Alemanha invadiu a Polônia, em 1939."],
  ["Quem era o Eixo?", "Alemanha, Itália e Japão."],
  ["Quem eram os Aliados?", "Inglaterra, França, União Soviética e Estados Unidos (e o Brasil)."],
  ["O que era a Blitzkrieg?", "A 'guerra-relâmpago': o ataque alemão rápido, com tanques e aviões juntos."],
  ["O que foi o ataque a Pearl Harbor (1941)?", "O Japão atacou os EUA, que então entraram na guerra."],
  ["De que lado o Brasil lutou?", "Do lado dos Aliados. Enviou a FEB (os 'pracinhas') para a Itália."],
  ["O que foi o Dia D (1944)?", "O desembarque dos Aliados na Normandia, que começou a libertar a Europa."],
  ["Como a guerra terminou no Japão?", "Com as bombas atômicas em Hiroshima e Nagasaki, em 1945."],
  ["O que era a Política de Apaziguamento?", "Ceder às exigências de Hitler para evitar a guerra. Deu errado."],
  ["Quais foram as grandes consequências?", "40 milhões de mortos, o começo da Guerra Fria (EUA x URSS) e a criação da ONU."],
  ["O que é a Declaração dos Direitos Humanos (1948)?", "Um documento que garante direitos a todo ser humano, sem exceção."],
];

let i = 0;
const $ = id => document.getElementById(id);

function mostrar(){
  $("contador").textContent = `Cartão ${i+1} de ${cartoes.length}`;
  $("pergunta").textContent = cartoes[i][0];
  $("resposta").textContent = cartoes[i][1];
  $("resposta").className = "resposta";
  $("ver").style.display = "inline-block";
  $("voltar").disabled = (i === 0);
  $("voltar").style.opacity = (i === 0) ? .4 : 1;
  $("prox").textContent = (i === cartoes.length-1) ? "🔁 Recomeçar" : "Próximo →";
}

$("ver").onclick = ()=>{
  $("resposta").className = "resposta mostrar";
  $("ver").style.display = "none";
};
$("prox").onclick = ()=>{
  i = (i+1) % cartoes.length;
  mostrar();
};
$("voltar").onclick = ()=>{
  if(i > 0){ i--; mostrar(); }
};

mostrar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revisão do Pedro: Fascismo e Nazismo</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif; background:linear-gradient(160deg,#eef3f9,#e3d7d7); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; color:#1E2B38;}
  .box{width:100%; max-width:520px; text-align:center;}
  h1{font-size:1.3rem; color:#8a1f1f; margin-bottom:4px;}
  .sub{color:#64748b; font-size:.9rem; margin-bottom:18px;}
  .contador{font-weight:700; color:#64748b; margin-bottom:12px;}
  .cartao{background:#fff; border-radius:22px; box-shadow:0 12px 34px rgba(30,43,56,.16); padding:36px 28px; min-height:250px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;}
  .rotulo{font-size:.75rem; letter-spacing:1.5px; text-transform:uppercase; font-weight:800;}
  .rotulo.p{color:#E25E42;} .rotulo.r{color:#2e7d4f;}
  .pergunta{font-size:1.4rem; font-weight:800; line-height:1.4;}
  .resposta{font-size:1.2rem; line-height:1.5; color:#13325a; display:none;}
  .resposta.mostrar{display:block; animation:sobe .2s ease;}
  @keyframes sobe{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .bts{display:flex; gap:10px; margin-top:18px; justify-content:center; flex-wrap:wrap;}
  button{font-family:inherit; font-size:1rem; font-weight:800; border:none; cursor:pointer; padding:14px 22px; border-radius:14px; transition:filter .15s;}
  button:hover{filter:brightness(1.08);}
  .ver{background:#8a1f1f; color:#fff;} .prox{background:#E25E42; color:#fff;} .voltar{background:#e2e8f0; color:#1E2B38;}
</style>
</head>
<body>
<a href="index.html" class="btn-voltar-hub" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;display:inline-flex;align-items:center;gap:7px;background:#E25E42;color:#fff;text-decoration:none;font-weight:800;font-size:1rem;padding:11px 18px;border-radius:30px;box-shadow:0 4px 14px rgba(0,0,0,.3);font-family:'Segoe UI',system-ui,Arial,sans-serif;">← Voltar</a>
<div class="box">
  <h1>⚫ Fascismo e Nazismo em cartões</h1>
  <div class="sub">Leia a pergunta, pense na resposta e depois confira. Pontos principais!</div>
  <div class="contador" id="contador"></div>
  <div class="cartao">
    <div>
      <div class="rotulo p">Pergunta</div>
      <div class="pergunta" id="pergunta"></div>
    </div>
    <div class="resposta" id="resposta"></div>
  </div>
  <div class="bts">
    <button class="voltar" id="voltar">← Voltar</button>
    <button class="ver" id="ver">👁️ Ver resposta</button>
    <button class="prox" id="prox">Próximo →</button>
  </div>
</div>
<script>
const cartoes = [
  ["O que abriu espaço para os extremismos na Europa?", "A crise econômica (destruição da 1ª Guerra + Crise de 1929)."],
  ["De onde vem a palavra 'fascismo'?", "De 'fascio' = feixe. Vários gravetos juntos representam o povo unido e obediente ao Estado."],
  ["Onde surgiu o fascismo e quem era o líder?", "Na Itália, com Benito Mussolini."],
  ["Qual foi a versão alemã do fascismo, e o líder?", "O nazismo, de Adolf Hitler."],
  ["Além de Itália e Alemanha, onde houve regimes parecidos?", "Espanha (Franco) e Portugal (Salazar)."],
  ["O que significa 'totalitarismo'?", "Quando o Estado quer controlar tudo, até a vida privada das pessoas."],
  ["Qual a diferença entre autoritário e totalitário?", "O autoritário controla a vida pública; o totalitário controla também a vida privada e íntima."],
  ["Qual era o lema do totalitarismo fascista?", "'Tudo no Estado, nada contra o Estado, nada fora do Estado.'"],
  ["Cite 3 ideias do fascismo.", "Culto ao líder, partido único e nacionalismo/militarismo exagerados (contra a democracia)."],
  ["Como Hitler chegou ao poder?", "Por eleições, em 1933 (democraticamente). Depois destruiu a democracia."],
  ["O que foi o incêndio do Reichstag?", "O incêndio do parlamento (1933). Hitler culpou os comunistas e usou como pretexto para virar ditador."],
  ["O que era o 'Führer'?", "'Guia/líder': o título de Hitler. Sua vontade virou a base da lei."],
  ["Quem cuidava da propaganda nazista?", "Goebbels, o ministro da Propaganda."],
  ["Quem eram as principais vítimas do nazismo?", "Sobretudo os judeus, mas também ciganos, comunistas, homossexuais e outros."],
  ["O que foi o Holocausto?", "O extermínio em massa de judeus e outros grupos pelos nazistas (mais de 1 milhão só em Auschwitz)."],
];
let i = 0;
const $ = id => document.getElementById(id);
function mostrar(){
  $("contador").textContent = `Cartão ${i+1} de ${cartoes.length}`;
  $("pergunta").textContent = cartoes[i][0];
  $("resposta").textContent = cartoes[i][1];
  $("resposta").className = "resposta";
  $("ver").style.display = "inline-block";
  $("voltar").disabled = (i === 0); $("voltar").style.opacity = (i === 0) ? .4 : 1;
  $("prox").textContent = (i === cartoes.length-1) ? "🔁 Recomeçar" : "Próximo →";
}
$("ver").onclick = ()=>{ $("resposta").className = "resposta mostrar"; $("ver").style.display = "none"; };
$("prox").onclick = ()=>{ i = (i+1) % cartoes.length; mostrar(); };
$("voltar").onclick = ()=>{ if(i > 0){ i--; mostrar(); } };
mostrar();
</script>
</body>
</html>

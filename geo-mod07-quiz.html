<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz do Pedro: A Segunda Guerra Mundial</title>
<style>
  :root{
    --navy:#1E2B38; --azul:#1d4e89; --azul-claro:#e8f0fb;
    --laranja:#FFE4CC; --coral:#E25E42;
    --verde:#2e7d4f; --verde-claro:#d7f0df;
    --vermelho:#c0392b; --vermelho-claro:#fbe0dc;
    --cinza:#64748b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;
    background:linear-gradient(160deg,#eef3f9,#e5ecf6); color:var(--navy);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:20px; line-height:1.55;
  }
  .app{
    width:100%; max-width:640px; background:#fff; border-radius:24px;
    box-shadow:0 12px 40px rgba(30,43,56,.15); overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--navy),var(--azul));
    color:#fff; padding:22px 26px 18px;
  }
  header .selo{font-size:.72rem; letter-spacing:1.5px; text-transform:uppercase; opacity:.8; font-weight:700;}
  header h1{font-size:1.35rem; margin-top:4px;}
  .barra-topo{display:flex; justify-content:space-between; align-items:center; margin-top:14px; font-size:.9rem; font-weight:700;}
  .progresso{height:9px; background:rgba(255,255,255,.25); border-radius:20px; margin-top:10px; overflow:hidden;}
  .progresso span{display:block; height:100%; width:0; background:var(--coral); border-radius:20px; transition:width .35s ease;}

  main{padding:26px 26px 30px;}
  .pergunta{font-size:1.25rem; font-weight:800; color:var(--navy); margin-bottom:20px; min-height:60px;}
  .alternativas{display:flex; flex-direction:column; gap:12px;}
  .alt{
    text-align:left; font-size:1.05rem; padding:15px 18px; border:2px solid #d9e2ec;
    background:#f8fafc; border-radius:14px; cursor:pointer; transition:all .15s ease;
    display:flex; align-items:center; gap:12px; font-family:inherit; color:var(--navy);
  }
  .alt:hover:not(:disabled){border-color:var(--azul); background:var(--azul-claro); transform:translateY(-1px);}
  .alt:disabled{cursor:default;}
  .alt .letra{
    flex:0 0 30px; height:30px; border-radius:50%; background:var(--navy); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.95rem;
  }
  .alt.certo{border-color:var(--verde); background:var(--verde-claro);}
  .alt.certo .letra{background:var(--verde);}
  .alt.errado{border-color:var(--vermelho); background:var(--vermelho-claro);}
  .alt.errado .letra{background:var(--vermelho);}

  .feedback{margin-top:20px; padding:15px 18px; border-radius:14px; display:none; font-size:1rem;}
  .feedback.mostrar{display:block; animation:sobe .25s ease;}
  .feedback.ok{background:var(--verde-claro); border-left:6px solid var(--verde);}
  .feedback.no{background:var(--vermelho-claro); border-left:6px solid var(--vermelho);}
  .feedback b{display:block; margin-bottom:3px;}
  @keyframes sobe{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  .proxima{
    margin-top:20px; width:100%; padding:15px; font-size:1.1rem; font-weight:800;
    background:var(--coral); color:#fff; border:none; border-radius:14px; cursor:pointer;
    font-family:inherit; display:none; transition:filter .15s;
  }
  .proxima.mostrar{display:block;}
  .proxima:hover{filter:brightness(1.08);}

  .final{text-align:center; padding:14px 6px;}
  .final .emoji{font-size:3.4rem;}
  .final h2{font-size:1.6rem; margin:10px 0;}
  .final .placar{font-size:1.15rem; color:var(--cinza); margin-bottom:6px;}
  .final .nota{font-size:3rem; font-weight:900; color:var(--azul); margin:6px 0;}
  .final .recado{background:var(--laranja); border-radius:14px; padding:14px 18px; margin:18px 0; color:var(--navy);}
  .refazer{padding:14px 28px; font-size:1.05rem; font-weight:800; background:var(--navy); color:#fff; border:none; border-radius:14px; cursor:pointer; font-family:inherit;}
  .refazer:hover{filter:brightness(1.15);}
</style>
</head>
<body>
<a href="index.html" class="btn-voltar-hub" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;display:inline-flex;align-items:center;gap:7px;background:#E25E42;color:#fff;text-decoration:none;font-weight:800;font-size:1rem;padding:11px 18px;border-radius:30px;box-shadow:0 4px 14px rgba(0,0,0,.3);font-family:'Segoe UI',system-ui,Arial,sans-serif;">← Voltar</a>
<div class="app">
  <header>
    <div class="selo">História · 9º ano · Quiz</div>
    <h1>A Segunda Guerra Mundial 🌍</h1>
    <div class="barra-topo">
      <span id="contador">Questão 1 de 48</span>
      <span id="placar">Acertos: 0</span>
    </div>
    <div class="progresso"><span id="barra"></span></div>
  </header>

  <main id="palco">
    <div class="pergunta" id="pergunta"></div>
    <div class="alternativas" id="alternativas"></div>
    <div class="feedback" id="feedback"></div>
    <button class="proxima" id="proxima">Próxima ➜</button>
  </main>
</div>

<script>
const questoes = [
  // --- Datas ---
  { q:"Em que ano começou a Segunda Guerra Mundial?", alt:["1914","1939","1969"], c:1,
    e:"Começou em 1939, quando a Alemanha invadiu a Polônia." },
  { q:"Em que ano terminou a Segunda Guerra Mundial?", alt:["1945","1955","1930"], c:0,
    e:"Terminou em 1945, com a rendição da Alemanha e depois do Japão." },
  { q:"A guerra durou de 1939 até...", alt:["1945","1980","1939"], c:0,
    e:"De 1939 a 1945. Foram 6 anos de guerra." },

  // --- Líderes (pares) ---
  { q:"Quem era o líder da Alemanha nazista?", alt:["Adolf Hitler","Charlie Chaplin","Winston Churchill"], c:0,
    e:"Hitler = Alemanha, nazismo." },
  { q:"Hitler era o líder de qual país?", alt:["Alemanha","Japão","Brasil"], c:0,
    e:"Hitler = Alemanha. (Guarde esse par: Hitler e Alemanha.)" },
  { q:"Quem era o líder fascista da Itália?", alt:["Benito Mussolini","Franco","Josef Stálin"], c:0,
    e:"Mussolini = Itália, fascismo." },
  { q:"Mussolini era o líder de qual país?", alt:["Itália","França","Estados Unidos"], c:0,
    e:"Mussolini = Itália. (Par: Mussolini e Itália.)" },

  // --- Estopim / Polônia (par) ---
  { q:"A guerra começou quando a Alemanha invadiu...", alt:["a Polônia","o Brasil","os Estados Unidos"], c:0,
    e:"A invasão da Polônia, em 1939, foi o estopim da guerra." },
  { q:"Qual país foi invadido e deu início à Segunda Guerra?", alt:["A Polônia","Portugal","A China"], c:0,
    e:"A Polônia. Foi aí que a guerra estourou, em 1939." },

  // --- Fascismo/nazismo: expansionismo ---
  { q:"O que o fascismo e o nazismo queriam fazer?", alt:["Conquistar terras dos vizinhos","Criar videogames","Acabar com as escolas"], c:0,
    e:"Eram expansionistas: queriam crescer conquistando territórios. Foi isso que provocou a guerra." },

  // --- Blitzkrieg (par + reforço) ---
  { q:"Como se chamava a tática alemã de ataque rápido?", alt:["Blitzkrieg","Apaziguamento","Anschluss"], c:0,
    e:"Blitzkrieg: a famosa 'guerra-relâmpago'." },
  { q:"O que significa a palavra 'Blitzkrieg'?", alt:["Guerra-relâmpago","Guerra fria","Guerra santa"], c:0,
    e:"Guerra-relâmpago: um ataque rápido e de surpresa." },
  { q:"Na Blitzkrieg, a Alemanha atacava de que jeito?", alt:["Rápido e de surpresa","Devagar e avisando antes","Só de navio, sem pressa"], c:0,
    e:"Rápido e de surpresa, juntando tanques, aviões e soldados de uma vez." },
  { q:"A Blitzkrieg deu certo contra a Inglaterra?", alt:["Não, os ingleses resistiram","Sim, a Inglaterra caiu logo","Sim, sem nenhuma luta"], c:0,
    e:"Não! Na Batalha da Grã-Bretanha os aviões ingleses resistiram. Foi o 1º tropeço de Hitler." },

  // --- Pearl Harbor (vários jeitos para massificar) ---
  { q:"Qual ataque fez os Estados Unidos entrarem na guerra?", alt:["O ataque à base americana de Pearl Harbor","A queda de Berlim","O bombardeio de Paris"], c:0,
    e:"O ataque à base americana de Pearl Harbor. Foi ele que puxou os EUA para a guerra." },
  { q:"Em 1941, o Japão atacou de surpresa qual base americana?", alt:["Pearl Harbor","Normandia","Stalingrado"], c:0,
    e:"Pearl Harbor, no Havaí. Depois disso, os EUA entraram na guerra." },
  { q:"Quem atacou a base americana de Pearl Harbor?", alt:["O Japão","A Itália","O Brasil"], c:0,
    e:"O Japão. Esse ataque japonês fez a guerra virar mundial." },
  { q:"Em que data foi o ataque a Pearl Harbor?", alt:["7 de dezembro de 1941","7 de setembro de 1822","1º de janeiro de 2000"], c:0,
    e:"7 de dezembro de 1941. É a data que marca a guerra ficando mundial." },
  { q:"Depois do ataque a Pearl Harbor, quem entrou na guerra?", alt:["Os Estados Unidos","O Brasil","A Alemanha"], c:0,
    e:"Os Estados Unidos. Pearl Harbor → entrada dos EUA." },

  // --- Eixo x Aliados (pares/reforço) ---
  { q:"Os três países principais do Eixo eram Alemanha, Itália e...", alt:["Japão","França","Inglaterra"], c:0,
    e:"Eixo = Alemanha + Itália + Japão." },
  { q:"O Japão fazia parte de qual lado?", alt:["Do Eixo","Dos Aliados","De nenhum lado"], c:0,
    e:"Do Eixo (junto com Alemanha e Itália)." },
  { q:"A Inglaterra fazia parte de qual lado?", alt:["Dos Aliados","Do Eixo","De nenhum lado"], c:0,
    e:"Dos Aliados (com França, URSS, EUA e Brasil)." },
  { q:"Os Estados Unidos lutaram de que lado?", alt:["Dos Aliados","Do Eixo","Ficaram neutros"], c:0,
    e:"Dos Aliados." },

  // --- Brasil (pares) ---
  { q:"De que lado o Brasil lutou na guerra?", alt:["Dos Aliados","Do Eixo","Ficou neutro o tempo todo"], c:0,
    e:"O Brasil lutou com os Aliados." },
  { q:"O Brasil lutou contra quem?", alt:["Contra o Eixo","Contra os Aliados","Contra os Estados Unidos"], c:0,
    e:"Contra o Eixo. (Brasil = Aliados, então luta contra o Eixo.)" },
  { q:"Por que o Brasil entrou na guerra?", alt:["Submarinos alemães afundaram navios brasileiros","Porque queria conquistar a Europa","Por causa de um jogo de futebol"], c:0,
    e:"Submarinos alemães afundaram navios brasileiros e mataram pessoas. Aí o Brasil entrou." },
  { q:"Qual era o nome da força brasileira enviada à guerra?", alt:["FEB (Força Expedicionária Brasileira)","ONU","RAF"], c:0,
    e:"FEB = Força Expedicionária Brasileira." },
  { q:"Como eram chamados os soldados brasileiros que foram à Itália?", alt:["Pracinhas","Samurais","Cossacos"], c:0,
    e:"Pracinhas. Eram os soldados da FEB." },
  { q:"Os pracinhas brasileiros foram lutar em qual país?", alt:["Itália","Japão","Rússia"], c:0,
    e:"Na Itália." },

  // --- Dia D (par) ---
  { q:"O desembarque dos Aliados na França, em 1944, é conhecido como...", alt:["Dia D","Guerra Fria","Semana de Arte Moderna"], c:0,
    e:"Dia D: o desembarque na Normandia, na França." },
  { q:"O Dia D aconteceu em qual país?", alt:["França (na Normandia)","Alemanha","Japão"], c:0,
    e:"Na França, na praia da Normandia. Ajudou a libertar a Europa." },

  // --- Batalhas da virada ---
  { q:"Qual batalha foi uma grande derrota da Alemanha na União Soviética?", alt:["Stalingrado","Pearl Harbor","Semana de Arte"], c:0,
    e:"A Batalha de Stalingrado. A partir dela, os Aliados foram vencendo." },

  // --- Fim da guerra ---
  { q:"O que aconteceu com Hitler no fim da guerra?", alt:["Suicidou-se, cercado em Berlim","Foi eleito presidente","Ganhou um prêmio de paz"], c:0,
    e:"Cercado em Berlim, em 1945, Hitler se matou." },
  { q:"O que aconteceu com Mussolini no fim da guerra?", alt:["Foi preso e morto","Virou rei da Itália","Fugiu para a Lua"], c:0,
    e:"Mussolini foi capturado e morto pela resistência italiana." },

  // --- Bombas atômicas (vários jeitos) ---
  { q:"As duas cidades japonesas destruídas por bombas atômicas foram Hiroshima e...", alt:["Nagasaki","Tóquio","Osaka"], c:0,
    e:"Hiroshima e Nagasaki, em 1945." },
  { q:"Hiroshima foi destruída por qual tipo de bomba?", alt:["Bomba atômica","Bomba de fumaça","Bomba de água"], c:0,
    e:"Bomba atômica. A mais poderosa e destruidora." },
  { q:"Qual cidade sofreu a PRIMEIRA bomba atômica?", alt:["Hiroshima","Nagasaki","Tóquio"], c:0,
    e:"Hiroshima foi a 1ª; Nagasaki foi a 2ª. Depois disso o Japão se rendeu." },
  { q:"Quem lançou as bombas atômicas no Japão?", alt:["Os Estados Unidos","A Alemanha","O Brasil"], c:0,
    e:"Os Estados Unidos, para forçar o Japão a se render." },

  // --- Apaziguamento (par) ---
  { q:"Como se chamou a política de ceder às exigências de Hitler para evitar a guerra?", alt:["Apaziguamento","Blitzkrieg","Nazismo"], c:0,
    e:"Política de Apaziguamento. Cederam a Hitler achando que ele pararia." },
  { q:"A Política de Apaziguamento deu certo?", alt:["Não, Hitler continuou invadindo","Sim, evitou a guerra","Sim, Hitler virou amigo de todos"], c:0,
    e:"Não! Hitler continuou invadindo. Ceder ao agressor não funcionou." },

  // --- Guerra Civil Espanhola ---
  { q:"Qual guerra foi um 'ensaio' para a Segunda Guerra Mundial?", alt:["A Guerra Civil Espanhola","A Guerra do Brasil","A Guerra de Troia"], c:0,
    e:"A Guerra Civil Espanhola. Ali a Alemanha e a Itália testaram armas e táticas." },

  // --- Chaplin (curiosidade) ---
  { q:"Qual ator fez um filme tirando sarro de Hitler ('O Grande Ditador')?", alt:["Charlie Chaplin","Neymar","Albert Einstein"], c:0,
    e:"Charlie Chaplin. A arte também virou uma arma contra a tirania." },

  // --- ONU (par) ---
  { q:"Que organização foi criada em 1945 para cuidar da paz no mundo?", alt:["A ONU","A FIFA","A NASA"], c:0,
    e:"A ONU (Organização das Nações Unidas), em 1945." },
  { q:"Em que ano foi criada a ONU?", alt:["1945","1900","2010"], c:0,
    e:"Em 1945, logo depois da guerra." },

  // --- Direitos Humanos ---
  { q:"O documento de 1948 que garante direitos a todo ser humano é a Declaração Universal dos...", alt:["Direitos Humanos","Jogos Olímpicos","Direitos do Consumidor"], c:0,
    e:"Declaração Universal dos Direitos Humanos (1948). Vale para todos, sem exceção." },

  // --- Consequências / Guerra Fria (par) ---
  { q:"Depois da guerra, quais foram as duas nações mais fortes do mundo?", alt:["Estados Unidos e União Soviética","Brasil e Itália","Japão e França"], c:0,
    e:"EUA e União Soviética viraram as duas superpotências." },
  { q:"A rivalidade entre Estados Unidos e União Soviética depois da guerra ficou conhecida como...", alt:["Guerra Fria","Guerra Santa","Copa do Mundo"], c:0,
    e:"Guerra Fria: uma disputa entre EUA e URSS, sem luta direta entre eles." },
  { q:"Quantas pessoas, mais ou menos, morreram na Segunda Guerra?", alt:["Cerca de 40 milhões","Cerca de 100","Ninguém morreu"], c:0,
    e:"Cerca de 40 milhões de pessoas. Foi a guerra mais mortal da história." },
];

let atual = 0, acertos = 0;
const letras = ["A","B","C"];
const $ = id => document.getElementById(id);

function render(){
  const item = questoes[atual];
  $("contador").textContent = `Questão ${atual+1} de ${questoes.length}`;
  $("placar").textContent = `Acertos: ${acertos}`;
  $("barra").style.width = `${(atual/questoes.length)*100}%`;
  $("pergunta").textContent = item.q;
  const box = $("alternativas"); box.innerHTML = "";
  item.alt.forEach((texto,i)=>{
    const b = document.createElement("button");
    b.className = "alt";
    b.innerHTML = `<span class="letra">${letras[i]}</span><span>${texto}</span>`;
    b.onclick = ()=>responder(i,b);
    box.appendChild(b);
  });
  const fb = $("feedback"); fb.className = "feedback"; fb.innerHTML = "";
  $("proxima").className = "proxima";
  $("proxima").textContent = atual === questoes.length-1 ? "Ver resultado 🏁" : "Próxima ➜";
}

function responder(escolha, botao){
  const item = questoes[atual];
  const botoes = document.querySelectorAll(".alt");
  botoes.forEach((b,i)=>{
    b.disabled = true;
    if(i === item.c) b.classList.add("certo");
    if(i === escolha && escolha !== item.c) b.classList.add("errado");
  });
  const fb = $("feedback");
  if(escolha === item.c){
    acertos++;
    fb.className = "feedback ok mostrar";
    fb.innerHTML = `<b>✅ Acertou!</b>${item.e}`;
  } else {
    fb.className = "feedback no mostrar";
    fb.innerHTML = `<b>❌ Quase!</b> A resposta certa é <b style="display:inline">${letras[item.c]}</b>. ${item.e}`;
  }
  $("placar").textContent = `Acertos: ${acertos}`;
  $("proxima").classList.add("mostrar");
}

$("proxima").onclick = ()=>{
  atual++;
  if(atual < questoes.length) render();
  else final();
};

function final(){
  const total = questoes.length;
  const nota = Math.round((acertos/total)*10*10)/10;
  const pct = acertos/total;
  let emoji, msg;
  if(pct >= 0.9){ emoji="🏆"; msg="Fera! Você mandou muito bem. Está pronto para a prova!"; }
  else if(pct >= 0.7){ emoji="😃"; msg="Muito bom! Só falta revisar alguns pontinhos."; }
  else if(pct >= 0.45){ emoji="🙂"; msg="Bom começo! Dá uma relida no resumo e refaça o quiz."; }
  else { emoji="💪"; msg="Sem problema! Leia o resumo com calma e tente de novo. Você consegue!"; }
  $("barra").style.width = "100%";
  $("contador").textContent = "Fim do quiz";
  $("palco").innerHTML = `
    <div class="final">
      <div class="emoji">${emoji}</div>
      <h2>Quiz concluído!</h2>
      <div class="placar">Você acertou <b>${acertos}</b> de <b>${total}</b> questões</div>
      <div class="nota">Nota ${nota}</div>
      <div class="recado">${msg}</div>
      <button class="refazer" onclick="reiniciar()">🔁 Fazer de novo</button>
    </div>`;
}

function reiniciar(){
  atual = 0; acertos = 0;
  $("palco").innerHTML = `
    <div class="pergunta" id="pergunta"></div>
    <div class="alternativas" id="alternativas"></div>
    <div class="feedback" id="feedback"></div>
    <button class="proxima" id="proxima">Próxima ➜</button>`;
  $("proxima").onclick = ()=>{ atual++; if(atual<questoes.length) render(); else final(); };
  render();
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revisão do Pedro: Distribuição Eletrônica</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif; background:linear-gradient(160deg,#e3f5f1,#d0ece7); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; color:#1E2B38;}
  .box{width:100%; max-width:520px; text-align:center;}
  h1{font-size:1.3rem; color:#0f766e; margin-bottom:4px;}
  .sub{color:#64748b; font-size:.9rem; margin-bottom:18px;}
  .contador{font-weight:700; color:#64748b; margin-bottom:12px;}
  .cartao{background:#fff; border-radius:22px; box-shadow:0 12px 34px rgba(15,118,110,.16); padding:36px 28px; min-height:250px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;}
  .rotulo{font-size:.75rem; letter-spacing:1.5px; text-transform:uppercase; font-weight:800;}
  .rotulo.p{color:#E25E42;} .rotulo.r{color:#2e7d4f;}
  .pergunta{font-size:1.4rem; font-weight:800; line-height:1.4;}
  .resposta{font-size:1.2rem; line-height:1.5; color:#0a4a45; display:none;}
  .resposta.mostrar{display:block; animation:sobe .2s ease;}
  @keyframes sobe{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .bts{display:flex; gap:10px; margin-top:18px; justify-content:center; flex-wrap:wrap;}
  button{font-family:inherit; font-size:1rem; font-weight:800; border:none; cursor:pointer; padding:14px 22px; border-radius:14px; transition:filter .15s;}
  button:hover{filter:brightness(1.08);}
  .ver{background:#0f766e; color:#fff;} .prox{background:#E25E42; color:#fff;} .voltar{background:#e2e8f0; color:#1E2B38;}
</style>
</head>
<body>
<a href="index.html" class="btn-voltar-hub" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;display:inline-flex;align-items:center;gap:7px;background:#E25E42;color:#fff;text-decoration:none;font-weight:800;font-size:1rem;padding:11px 18px;border-radius:30px;box-shadow:0 4px 14px rgba(0,0,0,.3);font-family:'Segoe UI',system-ui,Arial,sans-serif;">← Voltar</a>
<div class="box">
  <h1>⚛️ Distribuição Eletrônica em cartões</h1>
  <div class="sub">Leia a pergunta, pense na resposta e depois confira. Pontos principais!</div>
  <div class="contador" id="contador"></div>
  <div class="cartao">
    <div>
      <div class="rotulo p">Pergunta</div>
      <div class="pergunta" id="pergunta"></div>
    </div>
    <div class="resposta" id="resposta"></div>
  </div>
  <div class="bts">
    <button class="voltar" id="voltar">← Voltar</button>
    <button class="ver" id="ver">👁️ Ver resposta</button>
    <button class="prox" id="prox">Próximo →</button>
  </div>
</div>
<script>
const cartoes = [
  ["Num átomo neutro, o número atômico (Z) é igual a quê?", "Ao número de prótons E ao número de elétrons (Z = p = e⁻)."],
  ["Quais são as 7 camadas (níveis) dos elétrons?", "K, L, M, N, O, P, Q (da 1ª à 7ª)."],
  ["Quais são os subníveis?", "s, p, d, f."],
  ["Quantos elétrons cabem em cada subnível?", "s = 2, p = 6, d = 10, f = 14."],
  ["Para que serve o diagrama de Linus Pauling?", "Para mostrar a ORDEM de preenchimento dos subníveis (seguindo as diagonais)."],
  ["Qual subnível é preenchido primeiro: 3d ou 4s?", "O 4s vem antes do 3d (por causa da energia). É a pegadinha mais comum!"],
  ["Como é o começo da ordem de Pauling?", "1s, 2s, 2p, 3s, 3p, 4s, 3d, 4p, 5s, 4d, 5p, 6s..."],
  ["O que é um íon?", "Um átomo que ganhou ou perdeu elétrons."],
  ["O que é um cátion?", "Um íon positivo (+): perdeu elétrons. Ex.: Na⁺."],
  ["O que é um ânion?", "Um íon negativo (–): ganhou elétrons. Ex.: O⁻²."],
  ["Como distribuir um íon?", "Ajuste o número de elétrons (+ tira, – põe) e depois distribua normalmente."],
  ["Quem são os metais alcalinos (grupo 1A)?", "Li, Na, K, Rb, Cs, Fr."],
  ["Quem são os gases nobres?", "He, Ne, Ar, Kr, Xe, Rn."],
  ["Quem são os halogênios (7A)?", "F, Cl, Br, I, At, Ts."],
  ["O que significa 'isoeletrônicos'?", "Átomos ou íons que têm o mesmo número de elétrons."],
];
let i = 0;
const $ = id => document.getElementById(id);
function mostrar(){
  $("contador").textContent = `Cartão ${i+1} de ${cartoes.length}`;
  $("pergunta").textContent = cartoes[i][0];
  $("resposta").textContent = cartoes[i][1];
  $("resposta").className = "resposta";
  $("ver").style.display = "inline-block";
  $("voltar").disabled = (i === 0); $("voltar").style.opacity = (i === 0) ? .4 : 1;
  $("prox").textContent = (i === cartoes.length-1) ? "🔁 Recomeçar" : "Próximo →";
}
$("ver").onclick = ()=>{ $("resposta").className = "resposta mostrar"; $("ver").style.display = "none"; };
$("prox").onclick = ()=>{ i = (i+1) % cartoes.length; mostrar(); };
$("voltar").onclick = ()=>{ if(i > 0){ i--; mostrar(); } };
mostrar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revisão do Pedro: Europa — Economia</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif; background:linear-gradient(160deg,#e3f3e8,#d0ecd8); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; color:#1E2B38;}
  .box{width:100%; max-width:520px; text-align:center;}
  h1{font-size:1.3rem; color:#166534; margin-bottom:4px;}
  .sub{color:#64748b; font-size:.9rem; margin-bottom:18px;}
  .contador{font-weight:700; color:#64748b; margin-bottom:12px;}
  .cartao{background:#fff; border-radius:22px; box-shadow:0 12px 34px rgba(22,101,52,.16); padding:36px 28px; min-height:250px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;}
  .rotulo{font-size:.75rem; letter-spacing:1.5px; text-transform:uppercase; font-weight:800;}
  .rotulo.p{color:#E25E42;} .rotulo.r{color:#2e7d4f;}
  .pergunta{font-size:1.4rem; font-weight:800; line-height:1.4;}
  .resposta{font-size:1.2rem; line-height:1.5; color:#0c3d1f; display:none;}
  .resposta.mostrar{display:block; animation:sobe .2s ease;}
  @keyframes sobe{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .bts{display:flex; gap:10px; margin-top:18px; justify-content:center; flex-wrap:wrap;}
  button{font-family:inherit; font-size:1rem; font-weight:800; border:none; cursor:pointer; padding:14px 22px; border-radius:14px; transition:filter .15s;}
  button:hover{filter:brightness(1.08);}
  .ver{background:#166534; color:#fff;} .prox{background:#E25E42; color:#fff;} .voltar{background:#e2e8f0; color:#1E2B38;}
</style>
</head>
<body>
<a href="index.html" class="btn-voltar-hub" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;display:inline-flex;align-items:center;gap:7px;background:#E25E42;color:#fff;text-decoration:none;font-weight:800;font-size:1rem;padding:11px 18px;border-radius:30px;box-shadow:0 4px 14px rgba(0,0,0,.3);font-family:'Segoe UI',system-ui,Arial,sans-serif;">← Voltar</a>
<div class="box">
  <h1>💶 Europa: Economia em cartões</h1>
  <div class="sub">Leia a pergunta, pense na resposta e depois confira. Pontos principais!</div>
  <div class="contador" id="contador"></div>
  <div class="cartao">
    <div><div class="rotulo p">Pergunta</div><div class="pergunta" id="pergunta"></div></div>
    <div class="resposta" id="resposta"></div>
  </div>
  <div class="bts">
    <button class="voltar" id="voltar">← Voltar</button>
    <button class="ver" id="ver">👁️ Ver resposta</button>
    <button class="prox" id="prox">Próximo →</button>
  </div>
</div>
<script>
const cartoes = [
  ["Por que a Europa perdeu parte da sua força econômica no século XX?","Por causa das duas Guerras Mundiais, da perda de colônias e da concorrência de EUA, Japão e China."],
  ["O que é a União Europeia?","Um bloco econômico de 27 países que se uniram para comerciar com mais facilidade."],
  ["O que é o euro?","A moeda comum de vários países da UE (mas nem todos usam)."],
  ["O que é um bloco econômico?","A união de países para facilitar o comércio entre eles (menos impostos, regras comuns)."],
  ["Qual é a maior economia da Europa?","A Alemanha, seguida por Reino Unido, França, Itália e Espanha."],
  ["O que é o PIB?","A soma de tudo o que um país produz em um ano."],
  ["Quais são os três setores da economia?","Primário (agropecuária), secundário (indústria) e terciário (serviços)."],
  ["Qual setor emprega mais gente na Europa?","O terciário (serviços): ≈ 76% das pessoas e ≈ 70% do PIB."],
  ["Cite indústrias fortes da Europa.","Automóveis (Alemanha/França), aeroespacial, química/petroquímica, farmacêutica e eletrônica."],
  ["Qual a participação da UE no comércio mundial?","Cerca de 15% — supera os EUA, mas fica atrás da China."],
  ["Por que o champagne só se chama champagne se for da França?","Por causa da certificação de origem: só a região de Champagne pode usar o nome."],
  ["O que é IG no Brasil?","Indicação Geográfica, que pode ser IP (Indicação de Procedência) ou DO (Denominação de Origem)."],
];
let i = 0;
const $ = id => document.getElementById(id);
function mostrar(){
  $("contador").textContent = `Cartão ${i+1} de ${cartoes.length}`;
  $("pergunta").textContent = cartoes[i][0];
  $("resposta").textContent = cartoes[i][1];
  $("resposta").className = "resposta";
  $("ver").style.display = "inline-block";
  $("voltar").disabled = (i === 0); $("voltar").style.opacity = (i === 0) ? .4 : 1;
  $("prox").textContent = (i === cartoes.length-1) ? "🔁 Recomeçar" : "Próximo →";
}
$("ver").onclick = ()=>{ $("resposta").className = "resposta mostrar"; $("ver").style.display = "none"; };
$("prox").onclick = ()=>{ i = (i+1) % cartoes.length; mostrar(); };
$("voltar").onclick = ()=>{ if(i > 0){ i--; mostrar(); } };
mostrar();
</script>
</body>
</html>
